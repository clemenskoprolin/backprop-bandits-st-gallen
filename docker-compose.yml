services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://api:3003
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  api:
    build: ./backend
    ports:
      - "3003:3003"
    env_file: ./backend/.env
    environment:
      - MCP_URL=http://mcp:3001/mcp
      - RAG_URL=http://rag:3002
      - UPLOAD_DIR=/shared/uploads
    volumes:
      - uploads:/shared/uploads
    depends_on:
      mcp:
        condition: service_healthy
      rag:
        condition: service_started
    restart: unless-stopped

  rag:
    build: ./rag
    ports:
      - "3002:3002"
    env_file: ./rag/.env
    environment:
      - CHROMA_PATH=/data/vector_store
    volumes:
      - vector_store:/data/vector_store
      - uploads:/shared/uploads
    restart: unless-stopped

  mcp:
    image: mongodb/mongodb-mcp-server:latest
    ports:
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MDB_MCP_CONNECTION_STRING=mongodb://admin:olmamessen1st@host.docker.internal:27017/txp_clean?authSource=admin
      - MDB_MCP_REQUEST_TIMEOUT_MS=120000
    command: ["--transport", "http", "--httpHost", "0.0.0.0", "--httpPort", "3001"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/mcp || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  vector_store:
  uploads:
