version: "3.8"

# MongoDB MCP Server - provides MongoDB tools to the AI agent via MCP protocol
# Start: docker-compose -f docker-compose.mcp.yml up -d
# Stop:  docker-compose -f docker-compose.mcp.yml down
# Logs:  docker logs -f mongodb-mcp-server

services:
  mongodb-mcp:
    image: mongodb/mongodb-mcp-server:latest
    container_name: mongodb-mcp-server
    # Use host networking so 'localhost' refers to the host machine
    network_mode: host
    environment:
      # MongoDB connection string
      - MDB_MCP_CONNECTION_STRING=mongodb://localhost:27017/txp_clean
    command: ["--transport", "http", "--httpHost", "127.0.0.1", "--httpPort", "3000"]
    restart: unless-stopped
